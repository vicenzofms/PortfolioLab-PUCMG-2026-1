<header
  class="dark:bg-darkBg bg-white shadow-lg shadow-primary-500/40 font-semibold lg:px-40 lg:py-3 items-center flex lg:gap-6 justify-end lg:rounded-b-3xl sticky top-0 px-4"
>
  <div class="mr-auto flex gap-1 items-center">
    <button
      type="button"
      (click)="toggleTheme()"
      class="cursor-pointer text-2xl flex justify-center transition-all items-center w-10 h-10 hover:shadow-[0_0_12px_var(--color-primary-500)] rounded-full"
    >
      <ng-icon [name]="theme === 'dark' ? 'heroSunSolid' : 'heroMoonSolid'"></ng-icon>
    </button>
    <button
      type="button"
      (click)="changeLanguage()"
      class="cursor-pointer flex gap-2 px-4 justify-center transition-all items-center h-10 hover:shadow-[0_0_12px_var(--color-primary-500)] rounded-full"
    >
      <ng-icon name="heroLanguageSolid" class="text-2xl"></ng-icon>
      <span class="text-sm">{{ tSer.currentLanguage.toUpperCase() }}</span>
    </button>
  </div>
  <a
    href="#sobre"
    class="hover:text-primary-600 dark:hover:text-primary-500 hover:shadow-[inset_0_-2px_0_0_var(--color-primary-500)] p-2 transition-all delay-75 hidden lg:flex"
  >
    <ng-icon name="heroUserSolid"></ng-icon> {{ tSer.translate('abaSobreMim') }}</a
  >
  <a
    href="#projetos"
    class="hover:text-primary-600 dark:hover:text-primary-500 hover:shadow-[inset_0_-2px_0_0_var(--color-primary-500)] p-2 transition-all delay-75 hidden lg:flex"
  >
    <ng-icon name="heroFolderSolid"></ng-icon> {{ tSer.translate('abaProjetos') }}</a
  >
  <a
    href="#experiencia"
    class="hover:text-primary-600 dark:hover:text-primary-500 hover:shadow-[inset_0_-2px_0_0_var(--color-primary-500)] p-2 transition-all delay-75 hidden lg:flex"
  >
    <ng-icon name="heroBriefcaseSolid"></ng-icon> {{ tSer.translate('abaExperiencia') }}</a
  >
  <a
    href="#contato"
    class="hover:text-primary-600 dark:hover:text-primary-500 hover:shadow-[inset_0_-2px_0_0_var(--color-primary-500)] p-2 transition-all delay-75 hidden lg:flex"
  >
    <ng-icon name="heroChatBubbleLeftRightSolid"></ng-icon> {{ tSer.translate('abaContato') }}</a
  >

  <button
    type="button"
    (click)="toggleMenu()"
    class="cursor-pointer p-3 text-3xl lg:hidden items-center flex justify-center"
  >
    <ng-icon name="heroBars3Solid"></ng-icon>
  </button>
</header>

<!-- Overlay -->
<div
  class="fixed inset-0 bg-black/50 z-40 transition-opacity lg:hidden"
  [class.opacity-0]="!menuOpen"
  [class.pointer-events-none]="!menuOpen"
  (click)="closeMenu()"
></div>

<!-- Sidebar mobile -->
<nav
  class="fixed top-0 right-0 h-full w-64 dark:bg-darkBg bg-white shadow-xl z-50 flex flex-col p-6 gap-4 transition-transform duration-300 lg:hidden"
  [class.translate-x-0]="menuOpen"
  [class.translate-x-full]="!menuOpen"
>
  <button type="button" (click)="closeMenu()" class="cursor-pointer self-end text-3xl mb-4">
    <ng-icon name="heroXMarkSolid"></ng-icon>
  </button>
  <a
    href="#sobre"
    (click)="closeMenu()"
    class="flex items-center gap-2 p-3 rounded-lg hover:bg-primary-500/10 hover:text-primary-600 dark:hover:text-primary-500 transition-all"
  >
    <ng-icon name="heroUserSolid"></ng-icon> {{ tSer.translate('abaSobreMim') }}</a
  >
  <a
    href="#projetos"
    (click)="closeMenu()"
    class="flex items-center gap-2 p-3 rounded-lg hover:bg-primary-500/10 hover:text-primary-600 dark:hover:text-primary-500 transition-all"
  >
    <ng-icon name="heroFolderSolid"></ng-icon> {{ tSer.translate('abaProjetos') }}</a
  >
  <a
    href="#experiencia"
    (click)="closeMenu()"
    class="flex items-center gap-2 p-3 rounded-lg hover:bg-primary-500/10 hover:text-primary-600 dark:hover:text-primary-500 transition-all"
  >
    <ng-icon name="heroBriefcaseSolid"></ng-icon> {{ tSer.translate('abaExperiencia') }}</a
  >
  <a
    href="#contato"
    (click)="closeMenu()"
    class="flex items-center gap-2 p-3 rounded-lg hover:bg-primary-500/10 hover:text-primary-600 dark:hover:text-primary-500 transition-all"
  >
    <ng-icon name="heroChatBubbleLeftRightSolid"></ng-icon> {{ tSer.translate('abaContato') }}</a
  >
</nav>
