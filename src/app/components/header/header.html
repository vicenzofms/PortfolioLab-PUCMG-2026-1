<header
  class="dark:bg-darkBg bg-white shadow-lg shadow-primary-500/40 font-semibold lg:px-40 lg:py-3 flex lg:gap-6 justify-end lg:rounded-b-3xl sticky top-0 px-4"
>
  <div class="mr-auto flex gap-1 items-center">
    <button
      type="button"
      (click)="toggleTheme()"
      class="cursor-pointer text-2xl flex justify-center transition-all items-center w-10 h-10 hover:shadow-[0_0_12px_var(--color-primary-500)] rounded-full"
    >
      <ng-icon [name]="theme === 'dark' ? 'heroSunSolid' : 'heroMoonSolid'"></ng-icon>
    </button>
    <a
      href="#"
      class="hover:text-primary-600 dark:hover:text-primary-500 hover:shadow-[inset_0_-2px_0_0_var(--color-primary-500)] p-2 transition-all delay-75 hidden lg:flex"
    >
      <ng-icon name="heroHomeSolid"></ng-icon> Home</a
    >
  </div>
  <a
    href="#sobre"
    class="hover:text-primary-600 dark:hover:text-primary-500 hover:shadow-[inset_0_-2px_0_0_var(--color-primary-500)] p-2 transition-all delay-75 hidden lg:flex"
  >
    <ng-icon name="heroUserSolid"></ng-icon> Sobre Mim</a
  >
  <a
    href="#projetos"
    class="hover:text-primary-600 dark:hover:text-primary-500 hover:shadow-[inset_0_-2px_0_0_var(--color-primary-500)] p-2 transition-all delay-75 hidden lg:flex"
  >
    <ng-icon name="heroFolderSolid"></ng-icon> Projetos</a
  >
  <a
    href="#contato"
    class="hover:text-primary-600 dark:hover:text-primary-500 hover:shadow-[inset_0_-2px_0_0_var(--color-primary-500)] p-2 transition-all delay-75 hidden lg:flex"
  >
    <ng-icon name="heroChatBubbleLeftRightSolid"></ng-icon> Entre em contato!</a
  >

  <button type="button" class="p-3 text-3xl lg:hidden">
    <ng-icon name="heroBars3Solid"></ng-icon>
  </button>
</header>
